name: InTag CI

on:
  push:
    branches: [develop, main, 'release/**', 'hotfix/**']
  pull_request:
    branches: [develop, main]

env:
  DOTNET_VERSION: '10.0.x'
  SOLUTION_FILE: 'InTagSolution.slnx'

jobs:

  # ═══ BUILD & TEST ═══
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for SonarQube

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_FILE }} --no-restore --configuration Release

      - name: Run Unit Tests
        run: |
          dotnet test ${{ env.SOLUTION_FILE }} \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./TestResults

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ./TestResults/**/coverage.cobertura.xml

  # ═══ CODE QUALITY (SonarQube) ═══
  code-quality:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Download Coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: ./TestResults

      - name: Begin SonarQube Analysis
        run: |
          dotnet-sonarscanner begin \
            /k:"intag-software" \
            /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.cs.opencover.reportsPaths="./TestResults/**/coverage.cobertura.xml" \
            /d:sonar.coverage.exclusions="**/Migrations/**,**/wwwroot/**,**/Program.cs"

      - name: Build for Analysis
        run: dotnet build ${{ env.SOLUTION_FILE }} --configuration Release

      - name: End SonarQube Analysis
        run: dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

  # ═══ PUBLISH ARTIFACT ═══
  publish:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish
        run: |
          dotnet publish InTagWeb/InTagWeb.csproj \
            --configuration Release \
            --output ./publish

      - name: Upload Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: intag-web-${{ github.sha }}
          path: ./publish